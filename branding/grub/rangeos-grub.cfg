# RangeOS AI — GRUB config fragment
# Install to: /etc/default/grub.d/rangeos.cfg

GRUB_DISTRIBUTOR="RangeOS AI"
GRUB_TIMEOUT=3
GRUB_TIMEOUT_STYLE=countdown

# Graphical splash during GRUB menu
GRUB_BACKGROUND="/boot/grub/rangeos-splash.png"
GRUB_GFXMODE="1920x1080,auto"
GRUB_GFXPAYLOAD_LINUX=keep

# Kernel cmdline — quiet splash for Plymouth handoff
GRUB_CMDLINE_LINUX_DEFAULT="quiet splash plymouth.ignore-serial-consoles loglevel=3"
GRUB_CMDLINE_LINUX=""

# Color scheme
GRUB_COLOR_NORMAL="light-blue/black"
GRUB_COLOR_HIGHLIGHT="white/blue"

# Terminal
GRUB_TERMINAL_OUTPUT="gfxterm"
