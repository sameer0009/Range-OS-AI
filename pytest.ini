[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Custom markers
markers =
    integration: Marks tests requiring live services (deselect with -m "not integration")
    e2e: Marks full end-to-end tests (require full stack)
    unit: Pure unit tests with no external dependencies

# Output
addopts =
    -v
    --tb=short
    --no-header
    -q

# Asyncio mode
asyncio_mode = auto
